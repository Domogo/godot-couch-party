name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  godot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Godot 4.7 stable
        run: |
          mkdir -p "$RUNNER_TEMP/godot"
          curl --fail --location --retry 3 \
            --output "$RUNNER_TEMP/godot/godot.zip" \
            https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q "$RUNNER_TEMP/godot/godot.zip" -d "$RUNNER_TEMP/godot"
          chmod +x "$RUNNER_TEMP/godot/Godot_v4.7-stable_linux.x86_64"

      - name: Verify public behavior
        env:
          GODOT_BIN: ${{ runner.temp }}/godot/Godot_v4.7-stable_linux.x86_64
        run: ./tools/verify.sh
